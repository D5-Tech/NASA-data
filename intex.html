<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA Weather Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #1c2c4c, #11243b);
            color: #ffffff;
            min-height: 100vh;
        }
        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .box:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .value-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .value {
            font-size: 28px;
            font-weight: bold;
            margin-top: 5px;
            transition: all 0.5s ease;
        }
        h1 {
            text-align: center;
            color: #a3c1ff;
            margin: 0 0 20px 0;
            font-size: 24px;
        }
        h3 {
            margin: 0;
            font-size: 16px;
            color: #a3c1ff;
        }
        iframe {
            width: 100%;
            height: 300px;
            border: none;
            border-radius: 10px;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>NASA Weather Dashboard</h1>
        <div class="container">
            <div class="box value-box">
                <h3>Temperature</h3>
                <div id="temperature" class="value">Loading...</div>
            </div>
            <div class="box value-box">
                <h3>Humidity</h3>
                <div id="humidity" class="value">Loading...</div>
            </div>
            <div class="box">
                <h3>Temperature Graph</h3>
                <iframe src="https://thingspeak.com/channels/2683832/charts/2?bgcolor=%23ffffff&color=%23d62020&dynamic=true&results=60&title=Temperature&type=line&yaxis=Temperature+%C2%B0C"></iframe>
            </div>
            <div class="box">
                <h3>Humidity Graph</h3>
                <iframe src="https://thingspeak.com/channels/2683832/charts/1?bgcolor=%23ffffff&color=%23d62020&dynamic=true&results=60&title=Humidity&type=line&yaxis=Humidity+%25"></iframe>
            </div>
        </div>
    </div>

    <script>
        function updateValues() {
            fetch('https://api.thingspeak.com/channels/2683832/feeds/last.json')
                .then(response => response.json())
                .then(data => {
                    animateValue('temperature', data.field2 + ' °C');
                    animateValue('humidity', data.field1 + ' %');
                })
                .catch(error => console.error('Error fetching data:', error));
        }

        function animateValue(id, newValue) {
            const element = document.getElementById(id);
            element.style.animation = 'pulse 0.5s ease-in-out';
            setTimeout(() => {
                element.textContent = newValue;
                element.style.animation = '';
            }, 250);
        }

        updateValues();
        setInterval(updateValues, 15000); // Update every 15 seconds
    </script>
</body>
</html>
