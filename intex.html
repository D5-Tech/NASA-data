<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA Weather Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            background-color: #0a0e17;
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .dashboard {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background: linear-gradient(45deg, #12192c, #1c2942);
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 150, 255, 0.1);
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            color: #4dc3ff;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 0 0 10px rgba(77, 195, 255, 0.5);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }
        .box:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(77, 195, 255, 0.2);
        }
        .value-box {
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .value-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                from 0deg,
                transparent 0deg 340deg,
                rgba(77, 195, 255, 0.2) 340deg 360deg
            );
            animation: rotate 4s linear infinite;
        }
        .value-box-content {
            position: relative;
            z-index: 1;
        }
        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }
        .value {
            font-size: 2.5em;
            font-weight: bold;
            color: #4dc3ff;
            margin-top: 10px;
        }
        h3 {
            font-family: 'Orbitron', sans-serif;
            margin: 0 0 10px 0;
            color: #7a9cc6;
        }
        iframe {
            width: 100%;
            height: 300px;
            border: none;
            border-radius: 10px;
        }
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>NASA Weather Dashboard</h1>
        <div class="grid">
            <div class="box value-box">
                <div class="value-box-content">
                    <h3>Temperature</h3>
                    <div id="temperature" class="value">Loading...</div>
                </div>
            </div>
            <div class="box value-box">
                <div class="value-box-content">
                    <h3>Humidity</h3>
                    <div id="humidity" class="value">Loading...</div>
                </div>
            </div>
            <div class="box">
                <h3>Temperature Trend</h3>
                <iframe src="https://thingspeak.com/channels/2683832/charts/2?bgcolor=%230a0e17&color=%234dc3ff&dynamic=true&results=60&title=Temperature&type=line&yaxis=Temperature+%C2%B0C&width=auto"></iframe>
            </div>
            <div class="box">
                <h3>Humidity Trend</h3>
                <iframe src="https://thingspeak.com/channels/2683832/charts/1?bgcolor=%230a0e17&color=%234dc3ff&dynamic=true&results=60&title=Humidity&type=line&yaxis=Humidity+%25&width=auto"></iframe>
            </div>
        </div>
    </div>

    <script>
        function updateValues() {
            fetch('https://api.thingspeak.com/channels/2683832/feeds/last.json')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('temperature').textContent = data.field2 + ' °C';
                    document.getElementById('humidity').textContent = data.field1 + ' %';
                })
                .catch(error => console.error('Error fetching data:', error));
        }

        updateValues();
        setInterval(updateValues, 15000); // Update every 15 seconds
    </script>
</body>
</html>
